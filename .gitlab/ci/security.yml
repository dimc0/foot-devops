# .gitlab/ci/security.yml

# ── Audit des dépendances ─────────────────────────────────────────────────────

security:audit:
  stage: security
  script:
    - npm run security:audit
  rules:
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'
    - if: '$CI_COMMIT_BRANCH'
  # allow_failure: true pendant la phase de mise en place.
  # Retirer cette option une fois l'audit propre.
  allow_failure: true

# ── Analyse statique SAST ─────────────────────────────────────────────────────

security:sast:
  stage: security
  image: returntocorp/semgrep
  # Surcharge du before_script global — Semgrep n'a pas besoin de npm ci
  before_script: []
  script:
    # Appel direct à semgrep — npm n'est pas disponible dans cette image
    - semgrep --config=.semgrep.yml --error --json --output=semgrep-report.json . || semgrep --config=.semgrep.yml --error .
  rules:
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'
    - if: '$CI_COMMIT_BRANCH'
  artifacts:
    when: always
    paths:
      - semgrep-report.json
    expire_in: 7 days
  allow_failure: true