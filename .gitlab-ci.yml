# .gitlab-ci.yml

# .gitlab-ci.yml

include:
  - local: .gitlab/ci/lint.yml
  - local: .gitlab/ci/tests.yml

stages:
  - verify
  - lint
  - test
  - metrics
  - security
  - build
  - deploy

# ... (le reste est inchangé)

default:
  image: node:20-alpine
  # Cache des node_modules entre les jobs — évite un npm ci complet à chaque job
  cache:
    key:
      files:
        - package-lock.json
    paths:
      - node_modules/
  before_script:
    - npm ci

# ── Vérification de structure ─────────────────────────────────────────────────
verify:structure:
  stage: verify
  script:
    - test -d app/api || (echo "ERREUR app/api manquant" && exit 1)
    - test -d components || (echo "ERREUR components manquant" && exit 1)
    - test -d lib/tsdb || (echo "ERREUR lib/tmdb manquant" && exit 1)
    - test -d lib/db || (echo "ERREUR lib/db manquant" && exit 1)
    - echo "Structure valide"
  rules:
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'
    - if: '$CI_COMMIT_BRANCH'