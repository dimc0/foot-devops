# .gitlab-ci.yml

include:
  - local: .gitlab/ci/lint.yml
  - local: .gitlab/ci/tests.yml
  - local: .gitlab/ci/metrics.yml
  - local: .gitlab/ci/security.yml
  - local: .gitlab/ci/deploy.yml

stages:
  - verify
  - lint
  - test
  - metrics
  - security
  - build
  - deploy

default:
  image: node:20-alpine
  cache:
    key:
      files:
        - package-lock.json
    paths:
      - node_modules/
  before_script:
    - npm ci

verify:structure:
  stage: verify
  script:
    - test -d app/api || (echo "ERREUR app/api manquant" && exit 1)
    - test -d components || (echo "ERREUR components manquant" && exit 1)
    - test -d lib/tsdb || (echo "ERREUR lib/tsdb manquant" && exit 1)
    - test -d lib/db || (echo "ERREUR lib/db manquant" && exit 1)
    - test -d constants || (echo "ERREUR constants manquant" && exit 1)
    - echo "Structure valide"
  rules:
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'
    - if: '$CI_COMMIT_BRANCH'